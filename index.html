<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cafe Name</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fafafa;
    }

    header {
      background: #2c2c2c;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #444;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') center/cover;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2em;
      font-weight: bold;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      width: 200px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    footer {
      background: #2c2c2c;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Your Cafe Name</h1>
  <p>Fresh Coffee • Cozy Space • Good Vibes</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Menu</a>
  <a href="#">Contact</a>
</nav>

<div class="hero">
  Welcome to Our Cafe
</div>

<div class="section">
  <h2>Our Menu</h2>
  <div class="menu">
    <div class="card">
      <h3>Latte</h3>
      <p>$5</p>
    </div>
    <div class="card">
      <h3>Cappuccino</h3>
      <p>$4.5</p>
    </div>
    <div class="card">
      <h3>Croissant</h3>
      <p>$3</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Contact Us</h2>
  <p>123 Cafe Street</p>
  <p>Open Daily: 8am - 8pm</p>
</div>

<footer>
  <p>© 2026 Your Cafe Name</p>
</footer>

</body>
</html>
